name: Build and publish go-identify package

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install build dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Build .deb
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          PACKAGE=go-identify
          ARCH=all
          BUILD="${RUNNER_TEMP}/${PACKAGE}_${VERSION}_${ARCH}"
          DIST="${RUNNER_TEMP}/dist"

          mkdir -p "${BUILD}/DEBIAN" "${BUILD}/usr/bin" "${DIST}"

          install -Dm755 go-identify "${BUILD}/usr/bin/go-identify"

          cat > "${BUILD}/DEBIAN/control" << CONTROL
          Package: ${PACKAGE}
          Version: ${VERSION}
          Architecture: ${ARCH}
          Maintainer: GOcontroll B.V. <info@gocontroll.com>
          Depends: lsb-release, go-modules, go-sn, python3, iproute2
          Recommends: network-manager, modemmanager
          Section: utils
          Priority: optional
          Homepage: https://gocontroll.com
          Description: Comprehensive controller identification tool for GOcontroll Moduline
           Displays controller hardware info, installed go-* tool versions, Ethernet,
           WiFi/Bluetooth, 4G modem (SIM7600G), CAN interfaces, and installed module
           firmware with release dates from the GOcontroll cloud.
          CONTROL

          dpkg-deb -Zxz --build --root-owner-group "${BUILD}" \
            "${DIST}/${PACKAGE}_${VERSION}_${ARCH}.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/dist/go-identify_${{ steps.version.outputs.version }}_all.deb
          generate_release_notes: true

      - name: Trigger go-apt index rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: GOcontroll/go-apt
          event-type: rebuild-index
          client-payload: |
            {
              "package": "go-identify",
              "version": "${{ steps.version.outputs.version }}",
              "arch": "all",
              "deb_url": "https://github.com/GOcontroll/go-identify/releases/download/${{ github.ref_name }}/go-identify_${{ steps.version.outputs.version }}_all.deb"
            }
